name: christiangeorgelucas/geo-tools
version: 0.1.0
language: rust
description: Composable geospatial geometry nodes over a single GeoJSON envelope — distance, bearing, destination, length, geodesic area, centroid, bounding box, convex hull, RDP simplify, and point-in-polygon. Geodesic WGS-84, offline and deterministic, wrapping the Rust georust/geo library.
nodes:
    - name: Distance
      input: PointPair
      output: Distance
    - name: Bearing
      input: PointPair
      output: Bearing
    - name: Destination
      input: DestinationInput
      output: Geometry
    - name: Length
      input: Geometry
      output: Length
    - name: Area
      input: Geometry
      output: Area
    - name: Centroid
      input: Geometry
      output: Geometry
    - name: BoundingBox
      input: Geometry
      output: BoundingBox
    - name: ConvexHull
      input: Geometry
      output: Geometry
    - name: Simplify
      input: SimplifyInput
      output: Geometry
    - name: Contains
      input: ContainsInput
      output: Contains
